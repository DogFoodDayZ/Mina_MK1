<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mina Gremlin Overlay</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="overlay-root">
      <div id="avatar">
        <img src="/img/body-idle.png" data-layer="idle" class="avatar-layer visible" alt="Mina idle" />
        <img src="/img/talk-red-1.png" data-layer="talk-1" class="avatar-layer" alt="Mina talk frame 1" />
        <img src="/img/talk-red-2.png" data-layer="talk-2" class="avatar-layer" alt="Mina talk frame 2" />
        <img src="/img/smirk-back.png" data-layer="smirk-1" class="avatar-layer" alt="Mina smirk lean back" />
        <img src="/img/smirk-forward.png" data-layer="smirk-2" class="avatar-layer" alt="Mina smirk lean in" />
        <img src="/img/annoyed-1.png" data-layer="annoyed-1" class="avatar-layer" alt="Mina annoyed" />
        <img src="/img/annoyed-2.png" data-layer="annoyed-2" class="avatar-layer" alt="Mina annoyed alt" />
        <div class="glow"></div>
      </div>
      <div id="status-bar">Idle — ready</div>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
